<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="mi turno">
  <defs>

    <!-- ── Fondo squircle: blanco → azul hielo diagonal ── -->
    <linearGradient id="g-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F2F7FF"/>
      <stop offset="55%"  stop-color="#E4EEFB"/>
      <stop offset="100%" stop-color="#D2E4F8"/>
    </linearGradient>

    <!-- ── Letras: azul claro → azul vivo → azul profundo ── -->
    <linearGradient id="g-ltr" x1="256" y1="55" x2="256" y2="425" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B4D0FF"/>
      <stop offset="25%"  stop-color="#6FA0FA"/>
      <stop offset="65%"  stop-color="#4475EC"/>
      <stop offset="100%" stop-color="#2C52C8"/>
    </linearGradient>

    <!-- ── Brillo especular blanco en la parte superior ── -->
    <linearGradient id="g-hi" x1="256" y1="55" x2="256" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.52)"/>
      <stop offset="70%"  stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- ── Borde del squircle ── -->
    <linearGradient id="g-bd" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C6D9F5" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#9BBDE6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C2D8F6" stop-opacity="0.85"/>
    </linearGradient>

    <!-- ── Sombra suave en las letras ── -->
    <filter id="f-sh" x="-25%" y="-18%" width="155%" height="155%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1A3498" flood-opacity="0.22"/>
    </filter>

    <!-- ── Clip al squircle ── -->
    <clipPath id="cl-sq">
      <rect x="10" y="10" width="492" height="492" rx="116"/>
    </clipPath>

  </defs>

  <!-- ── Fondo ── -->
  <rect x="10" y="10" width="492" height="492" rx="116" fill="url(#g-bg)"/>

  <!-- Reflejo sutil en la mitad superior del fondo -->
  <rect x="10" y="10" width="492" height="250" rx="116"
        fill="rgba(255,255,255,0.18)" clip-path="url(#cl-sq)"/>

  <!-- ════════════════════════════════════════════
       Letras "mi" con efecto de volumen/vidrio
       Stroke path = trazo esquelético de cada letra
       con stroke-width grueso y extremos redondeados
       ════════════════════════════════════════════ -->

  <!-- Sombra proyectada -->
  <g filter="url(#f-sh)">
    <!-- "m": dos arcos que unen tres piernas -->
    <path
      d="M 96,422 L 96,182
         C 96,93  196,93  196,182 L 196,422
         M 196,422 L 196,182
         C 196,93  296,93  296,182 L 296,422"
      fill="none" stroke="url(#g-ltr)" stroke-width="86"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- "i" cuerpo -->
    <line x1="398" y1="182" x2="398" y2="422"
      stroke="url(#g-ltr)" stroke-width="86" stroke-linecap="round"/>

    <!-- "i" punto (desplazado ligeramente a la derecha como en el logo original) -->
    <circle cx="418" cy="70" r="46" fill="url(#g-ltr)"/>
  </g>

  <!-- Letras base (sin sombra, dibujadas encima) -->
  <path
    d="M 96,422 L 96,182
       C 96,93  196,93  196,182 L 196,422
       M 196,422 L 196,182
       C 196,93  296,93  296,182 L 296,422"
    fill="none" stroke="url(#g-ltr)" stroke-width="86"
    stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="398" y1="182" x2="398" y2="422"
    stroke="url(#g-ltr)" stroke-width="86" stroke-linecap="round"/>

  <circle cx="418" cy="70" r="46" fill="url(#g-ltr)"/>

  <!-- ── Brillo especular encima de las letras ── -->
  <!-- Capa blanca semi-transparente que crea el efecto "inflado"/vidrio -->
  <path
    d="M 96,422 L 96,182
       C 96,93  196,93  196,182 L 196,422
       M 196,422 L 196,182
       C 196,93  296,93  296,182 L 296,422"
    fill="none" stroke="url(#g-hi)" stroke-width="86"
    stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="398" y1="182" x2="398" y2="248"
    stroke="url(#g-hi)" stroke-width="86" stroke-linecap="round"/>

  <circle cx="418" cy="70" r="46" fill="url(#g-hi)"/>

  <!-- Destello brillante dentro de cada arco del "m" (punto de luz en el vértice) -->
  <path d="M 113,180 C 113,106 196,106 196,180"
    fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="22" stroke-linecap="round"/>
  <path d="M 196,180 C 196,106 279,106 279,180"
    fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="22" stroke-linecap="round"/>

  <!-- Pequeño destello en el punto del "i" -->
  <circle cx="406" cy="57" r="16" fill="rgba(255,255,255,0.42)"/>

  <!-- ── Borde del squircle ── -->
  <rect x="10" y="10" width="492" height="492" rx="116"
        fill="none" stroke="url(#g-bd)" stroke-width="2.5"/>

  <!-- Borde interior brillante (esquina superior-izquierda) -->
  <rect x="13" y="13" width="486" height="486" rx="113"
        fill="none" stroke="rgba(230,243,255,0.90)" stroke-width="1.5"/>

</svg>
