name: E2E tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancelar runs viejos del mismo branch cuando se pushean cambios nuevos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-and-e2e:
    name: Smoke + E2E (Chromium + WebKit móvil)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci --no-audit --no-fund

      # ─── Smoke tests (puros, sin browser) ───
      # Si fallan abortamos antes de gastar minutos en Playwright.
      - name: Smoke tests
        run: npm run test:smoke

      # ─── Setup Playwright + browsers ───
      # Chromium (desktop) + WebKit (motor de Safari iOS, el mismo que
      # usa tu PWA pinned al home). Re-habilitado en v50.
      - name: Install Playwright (chromium + webkit)
        run: npx playwright install --with-deps chromium webkit

      # ─── Debug: verificar que python sirve el index ANTES de Playwright ───
      # Ayuda a distinguir "server no arranca" de "test falla".
      - name: Sanity check del server local
        run: |
          python3 -m http.server 8123 --bind 127.0.0.1 &
          SERVER_PID=$!
          sleep 2
          echo "→ curl /"
          curl -sf -o /dev/null -w "Status: %{http_code}\n" http://127.0.0.1:8123/ || (echo "FAIL"; exit 1)
          echo "→ curl /version.json"
          curl -sf http://127.0.0.1:8123/version.json | head -5
          kill $SERVER_PID

      # ─── E2E ───
      # Playwright arranca su propio server (config webServer)
      - name: Run E2E tests
        run: npm run test:e2e -- --reporter=list

      # Subimos artifacts SIEMPRE (no solo en fallas) — primera iteración,
      # queremos ver el HTML report aunque pase.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
